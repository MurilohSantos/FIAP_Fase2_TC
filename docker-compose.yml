
services:

  api:
    build: .
    container_name: api-posts

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - mysql

  mysql:
    image: mysql:8

    container_name: mysql-api

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: escola

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

